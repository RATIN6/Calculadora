<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>

<style>
* {
    margin: 0;
    padding: 0;
}

.fundo {
    background-image: linear-gradient(45deg, black, crimson);
    height: 100vh;
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
}

.calculadora {
    position: absolute;
    background-color: rgba(0, 0, 0, 0.85);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 15px;
    padding: 15px;
}

.botao {
    width: 50px;
    height: 50px;
    font-size: 22px;
    cursor: pointer;
    margin: 3px;
    background-color: rgb(31,31,31);
    border: none;
    color: #fff;
    transition: 0.2s;
}

.botao:hover {
    background-color: black;
}

#resultado {
    background-color: white;
    width: 207px;
    height: 30px;
    margin: 5px;
    font-size: 22px;
    color: black;
    text-align: right;
    padding: 5px;
    overflow-x: auto;
}
</style>
</head>

<body>
<div class="fundo">
    <h1>Faça o seu cálculo</h1>

    <div class="calculadora">
        <h2>Calculadora</h2>
        <p id="resultado"></p>

        <table>
            <tr>
                <td><button class="botao" onclick="clean()">C</button></td>
                <td><button class="botao" onclick="back()">←</button></td>
                <td><button class="botao" onclick="insert('/')">/</button></td>
                <td><button class="botao" onclick="insert('*')">×</button></td>
            </tr>
            <tr>
                <td><button class="botao" onclick="insert('7')">7</button></td>
                <td><button class="botao" onclick="insert('8')">8</button></td>
                <td><button class="botao" onclick="insert('9')">9</button></td>
                <td><button class="botao" onclick="insert('-')">-</button></td>
            </tr>
            <tr>
                <td><button class="botao" onclick="insert('4')">4</button></td>
                <td><button class="botao" onclick="insert('5')">5</button></td>
                <td><button class="botao" onclick="insert('6')">6</button></td>
                <td><button class="botao" onclick="insert('+')">+</button></td>
            </tr>
            <tr>
                <td><button class="botao" onclick="insert('1')">1</button></td>
                <td><button class="botao" onclick="insert('2')">2</button></td>
                <td><button class="botao" onclick="insert('3')">3</button></td>
                <td rowspan="2">
                    <button class="botao" style="height: 106px;" onclick="calcular()">=</button>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <button class="botao" style="width: 106px;" onclick="insert('0')">0</button>
                </td>
                <td><button class="botao" onclick="insert('.')">.</button></td>
            </tr>
        </table>
    </div>
</div>

<script>
const display = document.getElementById("resultado");

function insert(valor) {
    const ultimo = display.textContent.slice(-1);

    // evita operadores duplicados
    if ("+-*/".includes(valor) && "+-*/".includes(ultimo)) {
        return;
    }

    display.textContent += valor;
}

function clean() {
    display.textContent = "";
}

function back() {
    display.textContent = display.textContent.slice(0, -1);
}

function calcular() {
    let conta = display.textContent;

    if (!conta) {
        display.textContent = "Nada...";
        return;
    }

    // valida expressão (segurança)
    if (!/^[0-9+\-*/.]+$/.test(conta)) {
        display.textContent = "Erro";
        return;
    }

    try {
        let resultado = Function("return " + conta)();
        display.textContent = resultado;
    } catch {
        display.textContent = "Erro";
    }
}

// suporte ao teclado
document.addEventListener("keydown", (e) => {
    if ("0123456789+-*/.".includes(e.key)) {
        insert(e.key);
    } else if (e.key === "Enter") {
        calcular();
    } else if (e.key === "Backspace") {
        back();
    } else if (e.key === "Escape") {
        clean();
    }
});
</script>

</body>
</html>
